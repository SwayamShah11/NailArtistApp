{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Create Sale</h2>

    <div class="card shadow-sm p-4">
        <form method="POST" id="sale-form">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Customer</label>

                <select id="customer" name="customer" class="form-select">

                    {% for customer in customers %}
                        <option value="{{ customer.id }}">
                            {{ customer }}
                        </option>
                    {% endfor %}

                </select>
                <!-- Hidden options for JavaScript -->

                <select id="product-options" class="d-none">
                    {% for product in products %}
                        <option
                            value="{{ product.id }}"
                            data-price="{{ product.selling_price }}">
                            {{ product.name }}
                        </option>
                    {% endfor %}
                </select>

                <select id="service-options" class="d-none">

                    {% for service in services %}

                        <option
                            value="{{ service.id }}"
                            data-price="{{ service.price }}">

                            {{ service.name }}

                        </option>

                    {% endfor %}

                </select>
            </div>

            <table class="table table-bordered" id="invoice-table">

                <thead>

                    <tr>
                        <th>Type</th>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>

                </thead>

                <tbody id="invoice-body">
                </tbody>

            </table>

            <button
                type="button"
                id="add-row"
                class="btn btn-secondary"
            >
                + Add Item
            </button>
            <hr>
            <h4 class="text-end">
                Grand Total: ₹<span id="grand-total">0.00</span>
            </h4>
            <input type="hidden" id="invoice-data" name="invoice_data">
            <button
                type="submit"
                class="btn btn-success mt-3">
                Save Invoice
            </button>
        </form>
    </div>
</div>


<script>

function updateGrandTotal() {

    let total = 0;

    document.querySelectorAll(".subtotal").forEach(function(cell){

        total += parseFloat(cell.value || 0);

    });

    document.getElementById("grand-total").innerText =
        total.toFixed(2);

}


document.getElementById("add-row")
.addEventListener("click", function(){

    const tbody =
        document.getElementById("invoice-body");

    const tr =
        document.createElement("tr");

    tr.innerHTML = `

<td>

<select class="form-select item-type">

<option value="product">

Product

</option>

<option value="service">

Service

</option>

</select>

</td>

<td>

<select class="form-select item-select">

</select>

</td>

<td>

<input
type="number"
value="1"
min="1"
class="form-control quantity">

</td>

<td>

<input
type="number"
class="form-control price"
readonly>

</td>

<td>

<input
type="number"
class="form-control subtotal"
readonly>

</td>

<td>

<button
type="button"
class="btn btn-danger remove-row">

X

</button>

</td>

`;

    tbody.appendChild(tr);

    populateItems(tr);

});


document.addEventListener("change", function(e){

    if(e.target.classList.contains("item-type")){

        populateItems(
            e.target.closest("tr")
        );

    }

});


document.addEventListener("change", function(e){

    if(e.target.classList.contains("item-select")){

        const option = e.target.selectedOptions[0];

        const price = option.dataset.price;

        const row = e.target.closest("tr");

        row.querySelector(".price").value = price;

        calculateRow(row);

    }

});


document.addEventListener("input", function(e){

    if(
        e.target.classList.contains("quantity")
    ){

        calculateRow(
            e.target.closest("tr")
        );

    }

});


document.addEventListener("click", function(e){

    if(
        e.target.classList.contains("remove-row")
    ){

        e.target.closest("tr").remove();

        updateGrandTotal();

    }

});


function populateItems(row) {

    const type = row.querySelector(".item-type").value;

    const select = row.querySelector(".item-select");

    const source = document.getElementById(type + "-options");

    select.innerHTML = source.innerHTML;

    // Set the first item's price immediately
    if (select.options.length > 0) {

        const firstOption = select.options[0];

        row.querySelector(".price").value =
            firstOption.dataset.price || 0;

        calculateRow(row);
    }
}


function calculateRow(row){

    const qty = parseFloat(
        row.querySelector(".quantity").value
    ) || 0;

    const price = parseFloat(
        row.querySelector(".price").value
    ) || 0;

    row.querySelector(".subtotal").value =
        (qty * price).toFixed(2);

    updateGrandTotal();
}


document.getElementById("sale-form")
.addEventListener("submit", function (e) {

    const rows = [];

    document.querySelectorAll("#invoice-body tr")
        .forEach(function (row) {

            rows.push({

                type:
                    row.querySelector(".item-type").value,

                id:
                    row.querySelector(".item-select").value,

                quantity:
                    row.querySelector(".quantity").value,

                price:
                    row.querySelector(".price").value

            });

        });

    document.getElementById(
        "invoice-data"
    ).value = JSON.stringify(rows);

});
</script>
{% endblock %}
