{% extends "base.html" %}

{% block title %}Stock Adjustment{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-header">
            <h3>Stock Adjustment</h3>
        </div>

        <div class="card-body">

            <form method="POST">
                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-primary">
                    Save Adjustment
                </button>

                <a
                    href="{% url 'inventory_list' %}"
                    class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>
    </div>

</div>

{% endblock %}
