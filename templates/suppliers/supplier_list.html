{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-4">

<h2>
Suppliers
</h2>

<a href="{% url 'supplier_create' %}"
   class="btn btn-success">

Add Supplier

</a>

</div>

<table class="table table-striped">

<thead>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>GST</th>
</tr>

</thead>

<tbody>

{% for supplier in suppliers %}

<tr>

<td>{{ supplier.name }}</td>
<td>{{ supplier.phone }}</td>
<td>{{ supplier.email }}</td>
<td>{{ supplier.gst_number }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
