{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">
        Accounting Summary
    </h2>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Total Sales</h6>
                    <h3>₹{{ total_sales }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Total Purchases</h6>
                    <h3>₹{{ total_purchases }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Total Expenses</h6>
                    <h3>₹{{ total_expenses }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm border-success">
                <div class="card-body">
                    <h6>Estimated Profit</h6>
                    <h3>₹{{ estimated_profit }}</h3>
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
